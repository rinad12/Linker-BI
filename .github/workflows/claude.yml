name: Claude Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            Conduct a code review for PR #${{ github.event.pull_request.number }}. 
            Focus on quality, security, and performance. 
            Use 'create_inline_comment' to leave feedback on specific lines in the Files Changed tab.
          claude_args: '/review "Leave inline comments for all issues found using the create_inline_comment tool." --post --yes'
