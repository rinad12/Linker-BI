name: Claude Review

on:
  pull_request:
    types: [opened, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          trigger_phrase: "@claude"
          prompt: |
            Before reviewing, fetch the context for PR #${{ github.event.pull_request.number }}:

            1. Get the PR body and linked issues:
               gh pr view ${{ github.event.pull_request.number }} --json title,body,closingIssuesReferences

            2. For each linked issue, fetch its description:
               gh issue view <issue_number> --json title,body,labels

            Use this issue context to understand the INTENDED SCOPE of this PR.
            Only review changes that are relevant to the task described in the linked issue(s).
            Do NOT suggest improvements, refactors, or features outside that scope — even if you notice them.
            If you see out-of-scope issues, briefly mention them in the summary as "out of scope for this PR" without blocking.

            For every in-scope issue found, use the Bash tool to post an inline comment directly on the
            relevant line using the GitHub API:

            gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments \
              --method POST \
              -f body="<your comment>" \
              -f commit_id="${{ github.event.pull_request.head.sha }}" \
              -f path="<file path>" \
              -F line=<line number> \
              -f side="RIGHT"

            Review all changed files and leave specific, actionable inline comments.

            After all inline comments, post a general summary comment on the PR using:
            gh pr comment ${{ github.event.pull_request.number }} --body "<summary>"

            The summary should include: linked issue(s), overall assessment, key findings, and any blocking issues.
          claude_args: "--allowedTools Bash"
