name: Claude Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Conduct a thorough code review for PR #${{ github.event.pull_request.number }}.
            Focus on quality, security, and performance issues.

            For every issue found, use the Bash tool to post an inline comment directly on the
            relevant line using the GitHub API:

            gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments \
              --method POST \
              -f body="<your comment>" \
              -f commit_id="${{ github.event.pull_request.head.sha }}" \
              -f path="<file path>" \
              -F line=<line number> \
              -f side="RIGHT"

            Review all changed files and leave specific, actionable inline comments.
          allowed_tools: "Bash"
